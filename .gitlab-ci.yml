# Builds and pushes the container image to the project's GitLab registry
# whenever a release tag (vX.Y.Z, created via `task release`) is pushed.
# The image is tagged with the version (without the v prefix) and :latest.

stages:
  - build

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:${CI_COMMIT_TAG#v}" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:${CI_COMMIT_TAG#v}"
    - docker push "$CI_REGISTRY_IMAGE:latest"
